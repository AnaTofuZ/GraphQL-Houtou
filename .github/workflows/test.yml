name: test
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        perl:
          [
            "5.44",
            "5.42",
            "5.40",
            "5.38",
            "5.36",
            "5.34",
            "5.32",
            "5.30",
            "5.28",
            "5.26",
            "5.24",
          ]
    name: Perl ${{ matrix.perl }}
    container:
      image: perldocker/perl-tester:${{ matrix.perl }}
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: cpm install -g --with-all --show-build-log-on-failure -v
      - name: Build XS distribution
        run: |
          perl Build.PL
          ./Build build
      - name: Run test
        run: ./Build test
