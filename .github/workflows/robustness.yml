name: robustness
on: [push, pull_request]
jobs:
  asan:
    name: ASan test suite
    runs-on: ubuntu-latest
    container:
      image: perldocker/perl-tester:5.42
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: cpm install -g --with-all --show-build-log-on-failure -v
      - name: Build with ASan
        run: |
          perl Build.PL --config optimize="-O2 -g -fsanitize=address -fno-omit-frame-pointer" --config lddlflags="-shared -fsanitize=address"
          ./Build build
      - name: Run test suite under ASan (hash-seed sweep)
        run: |
          LIBASAN=$(gcc -print-file-name=libasan.so)
          # detect_leaks stays off: the perl interpreter's own arena
          # bookkeeping drowns LSan; RSS-slope leak detection is the soak
          # job's responsibility. detect_stack_use_after_return covers the
          # class of bug fixed in PR #22.
          export LD_PRELOAD=$LIBASAN
          export ASAN_OPTIONS=detect_leaks=0:detect_stack_use_after_return=1:abort_on_error=1:malloc_context_size=20
          export PERL_DESTRUCT_LEVEL=2
          # Sweep hash seeds: HV iteration order changes pool layouts, so an
          # uninitialized read (e.g. the #45 SEGV) can fire only on some
          # seeds. A single seed once passed while the same commit crashed
          # on another - see docs/xs-coding-rules.md.
          for seed in 0 1 2 3 5 8 13; do
            echo "== PERL_HASH_SEED=$seed =="
            PERL_HASH_SEED=$seed prove -b -Iblib/lib -Iblib/arch t/
          done
      - name: Parser fuzz smoke under ASan
        run: |
          export LD_PRELOAD=$(gcc -print-file-name=libasan.so)
          export ASAN_OPTIONS=detect_leaks=0:abort_on_error=1:malloc_context_size=20
          # A few seeds so mutation coverage varies run to run.
          for seed in 1 2 3; do
            perl -Iblib/lib -Iblib/arch util/parser-fuzz.pl --iterations 30000 --seed $seed
          done
  soak:
    name: RSS soak
    runs-on: ubuntu-latest
    container:
      image: perldocker/perl-tester:5.42
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: cpm install -g --with-all --show-build-log-on-failure -v
      - name: Build
        run: |
          perl Build.PL
          ./Build build
      - name: Soak (mixed request patterns, RSS growth gate)
        run: perl -Iblib/lib -Iblib/arch util/soak-test.pl --iterations 20000 --warmup 5000 --max-growth-kb 8192
  valgrind:
    name: Valgrind leak gate
    runs-on: ubuntu-latest
    container:
      image: perldocker/perl-tester:5.42
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: |
          cpm install -g --with-all --show-build-log-on-failure -v
          apt-get update -qq && apt-get install -y -qq valgrind
      - name: Build
        run: |
          perl Build.PL
          ./Build build
      # PERL_DESTRUCT_LEVEL=2 makes perl free everything at exit so a real
      # leak in our XS shows as definitely/indirectly lost; the suppression
      # file silences the interpreter's own still-reachable bookkeeping.
      # R5 is closed: the abandoned-request block-frame cycle (t/36 / t/37 /
      # t/39) and the fast-lane croak path-frame leaks (t/35 / t/48) are
      # fixed, so the gate covers the whole suite; t/54 additionally asserts
      # the XS frame live-counters return to zero per scenario.
      - name: Valgrind (full suite, definite/indirect are errors)
        run: |
          for t in t/*.t; do
            echo "== valgrind $t =="
            PERL_DESTRUCT_LEVEL=2 valgrind -q --leak-check=full \
              --errors-for-leak-kinds=definite,indirect --error-exitcode=99 \
              --suppressions=util/valgrind-perl.supp \
              perl -Iblib/lib -Iblib/arch "$t"
          done
  lint-xs-ownership:
    name: XS ownership lint
    runs-on: ubuntu-latest
    container:
      image: perldocker/perl-tester:5.42
    steps:
      - uses: actions/checkout@v3
      - name: Run lint
        run: perl util/lint-xs-ownership.pl
  compiler-warnings:
    name: Compiler warning gate
    runs-on: ubuntu-latest
    container:
      image: perldocker/perl-tester:5.42
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: cpm install -g --with-all --show-build-log-on-failure -v
      # Generate the XS .c (Build creates lib/GraphQL/Houtou.c), then
      # recompile it with warnings as errors. -Wno-unused-parameter is the
      # one blanket exception: pTHX and unused XSUB tail args are pervasive
      # and not bugs. Everything else (unused/uninitialized variables, sign
      # comparisons, ...) must stay clean.
      - name: Build (emits the XS .c)
        run: |
          perl Build.PL
          ./Build build
      - name: Recompile the XS with -Werror
        run: |
          CORE=$(perl -MConfig -e 'print $Config{archlibexp}')/CORE
          cc -Isrc -I"$CORE" -DVERSION='"0.01"' -DXS_VERSION='"0.01"' \
             -c -fno-common -fno-strict-aliasing -O2 \
             -Wall -Wextra -Wno-unused-parameter -Werror \
             -o /dev/null lib/GraphQL/Houtou.c
